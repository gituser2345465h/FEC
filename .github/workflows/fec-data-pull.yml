name: FEC Data Pull

on:
  schedule:
    # Run daily at 6:00 AM ET (11:00 UTC) — after FEC overnight processing
    - cron: '0 11 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  pull-schedule-e:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Pull Schedule E (Independent Expenditures)
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: python scripts/pull_schedule_e.py

      - name: Commit Schedule E data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/FECScheduleE_latest.csv
          git diff --cached --quiet || git commit -m "Update Schedule E data - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

